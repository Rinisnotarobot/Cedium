name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/Cedium
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh

      - name: Health check
        run: |
          sleep 10
          curl -f https://cedium.inari-jinja.org || echo "健康检查失败，请手动检查容器状态"